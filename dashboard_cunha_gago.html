<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAVAí · Acesso Condô</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--cyan:#2563eb;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--sans:'Inter',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans)}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8f9fc;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(to right,#1d4ed8,transparent 50px) left/50px 100% no-repeat,
    linear-gradient(to left,#1d4ed8,transparent 50px) right/50px 100% no-repeat,
    linear-gradient(to bottom,#1d4ed8,transparent 80px) top/100% 80px no-repeat,
    linear-gradient(to top,#1d4ed8,transparent 50px) bottom/100% 50px no-repeat;
  opacity:.15}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:40px 36px;
  width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08);position:relative;z-index:1;
  animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-mark{width:44px;height:44px;background:linear-gradient(135deg,#2563eb,#0ea5e9);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.logo-text h1{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-text p{font-size:12px;color:var(--muted);margin-top:2px}
.field{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.4px;margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}
.input-wrap .eye{left:auto;right:12px;cursor:pointer;transition:color .15s}
.input-wrap .eye:hover{color:var(--cyan)}
input{width:100%;background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;
  padding:11px 12px 11px 36px;color:var(--text);font-size:14px;font-family:var(--sans);
  outline:none;transition:border-color .15s}
input.has-eye{padding-right:36px}
input:focus{border-color:var(--cyan);background:#fff}
input.shake{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.btn{width:100%;background:var(--cyan);color:#fff;border:none;padding:12px;border-radius:8px;
  font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn:hover{background:#1d4ed8}
.btn:disabled{opacity:.6;cursor:default;pointer-events:none}
.err{font-size:12px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;
  border-radius:7px;padding:10px 12px;margin-top:12px;display:none}
.err.show{display:block}
#field-senha{display:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark"><i class="fas fa-soap"></i></div>
    <div class="logo-text">
      <h1>LAVAí Condô</h1>
      <p>Painel de operações · Cunha Gago</p>
    </div>
  </div>

  <div class="field">
    <label for="inp-email">E-mail</label>
    <div class="input-wrap">
      <i class="fas fa-envelope"></i>
      <input type="email" id="inp-email" placeholder="seu@email.com" autocomplete="email"
        oninput="onEmailInput()">
    </div>
  </div>

  <div class="field" id="field-senha">
    <label for="inp-senha">Senha</label>
    <div class="input-wrap">
      <i class="fas fa-lock"></i>
      <input type="password" id="inp-senha" placeholder="••••••••" class="has-eye"
        autocomplete="current-password">
      <i class="fas fa-eye eye" id="eye-btn" onclick="toggleSenha()"></i>
    </div>
  </div>

  <div class="err" id="msg-err"></div>

  <button class="btn" id="btn-entrar" onclick="entrar()">
    <span id="btn-txt">Entrar</span>
  </button>
</div>

<script>
// ── Usuários autorizados ───────────────────────────────
// dominio: qualquer @lavai.com.vc entra sem senha
// senha: emails específicos com senha
var DOMINIO_LIVRE = 'lavai.com.vc';
var USUARIOS_SENHA = {
  'anrose@ahi.com.br':  'Lavai&ahi29032107',
  'pkoyama@ahi.com.br': 'Lavai&ahi29032107'
};
var SESSAO_HORAS = 24;

// ── Estado ─────────────────────────────────────────────
var precisaSenha = false;

function onEmailInput() {
  var email = document.getElementById('inp-email').value.trim().toLowerCase();
  var fieldSenha = document.getElementById('field-senha');
  var errEl = document.getElementById('msg-err');
  errEl.className = 'err';

  // Mostra campo senha só para emails com senha cadastrada
  if (USUARIOS_SENHA.hasOwnProperty(email)) {
    fieldSenha.style.display = 'block';
    precisaSenha = true;
  } else {
    fieldSenha.style.display = 'none';
    precisaSenha = false;
  }
}

function toggleSenha() {
  var inp = document.getElementById('inp-senha');
  var eye = document.getElementById('eye-btn');
  if (inp.type === 'password') {
    inp.type = 'text';
    eye.className = 'fas fa-eye-slash eye';
  } else {
    inp.type = 'password';
    eye.className = 'fas fa-eye eye';
  }
}

function erro(msg) {
  var el = document.getElementById('msg-err');
  el.textContent = msg;
  el.className = 'err show';
  // Shake nos inputs
  document.getElementById('inp-email').classList.add('shake');
  setTimeout(function() {
    document.getElementById('inp-email').classList.remove('shake');
  }, 300);
}

function entrar() {
  var email = document.getElementById('inp-email').value.trim().toLowerCase();
  var senha = document.getElementById('inp-senha').value;
  var errEl = document.getElementById('msg-err');
  errEl.className = 'err';

  // Validação básica
  if (!email || !email.includes('@')) {
    erro('Digite um e-mail válido.');
    return;
  }

  // Verifica acesso
  var autorizado = false;

  // 1. Email com senha cadastrada
  if (USUARIOS_SENHA.hasOwnProperty(email)) {
    if (!senha) {
      erro('Digite a senha para este e-mail.');
      document.getElementById('inp-senha').focus();
      return;
    }
    if (senha !== USUARIOS_SENHA[email]) {
      erro('Senha incorreta.');
      document.getElementById('inp-senha').value = '';
      document.getElementById('inp-senha').focus();
      return;
    }
    autorizado = true;
  }
  // 2. Domínio livre @lavai.com.vc
  else if (email.endsWith('@' + DOMINIO_LIVRE)) {
    autorizado = true;
  }
  // 3. Não autorizado
  else {
    erro('E-mail não autorizado para este painel.');
    return;
  }

  if (autorizado) {
    // Salva sessão
    localStorage.setItem('lavai_condo_session', JSON.stringify({
      email: email,
      exp: Date.now() + SESSAO_HORAS * 60 * 60 * 1000
    }));
    // Redireciona
    var btn = document.getElementById('btn-entrar');
    btn.disabled = true;
    document.getElementById('btn-txt').innerHTML = '<div class="spinner"></div>';
    window.location.replace('/condo/dashboard');
  }
}

// ── Verifica sessão ativa ──────────────────────────────
(function() {
  try {
    var s = JSON.parse(localStorage.getItem('lavai_condo_session') || '{}');
    if (s.exp && Date.now() < s.exp) {
      window.location.replace('/condo/dashboard');
    }
  } catch(e) {}
})();

// ── Enter nos inputs ───────────────────────────────────
document.getElementById('inp-email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (precisaSenha) document.getElementById('inp-senha').focus();
    else entrar();
  }
});
document.getElementById('inp-senha').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') entrar();
});
</script>
</body>
</html>
